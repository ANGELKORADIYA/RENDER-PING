name: Render Ping

on:
  schedule:
    - cron: '*/5 3-18 * * *'   # 8:30am–11:30pm IST
  workflow_dispatch:

jobs:
  ping-websites:
    runs-on: ubuntu-latest
    steps:
      - name: Ping white-rock
        run: |
          curl --fail \
               --retry 3 \
               --retry-delay 5 \
               --max-time 30 \
               --silent \
               --show-error \
               -o /dev/null \
               -w "white-rock → HTTP %{http_code}\n" \
               https://white-rock.onrender.com

      - name: Ping bit-stash
        run: |
          curl --fail \
               --retry 3 \
               --retry-delay 5 \
               --max-time 30 \
               --silent \
               --show-error \
               -o /dev/null \
               -w "bit-stash → HTTP %{http_code}\n" \
               https://api-bit-stash.onrender.com/